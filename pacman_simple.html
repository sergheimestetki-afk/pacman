<!DOCTYPE html><html><head><title>Pac-Man</title></head><body><h1>Pac-Man Game</h1><canvas id="game" width="400" height="400"></canvas><script>const canvas=document.getElementById("game");const ctx=canvas.getContext("2d");let pacman={x:200,y:200,direction:0};let dots=[];for(let i=0;i<20;i++){dots.push({x:Math.random()*400,y:Math.random()*400});}function draw(){ctx.fillStyle="black";ctx.fillRect(0,0,400,400);ctx.fillStyle="yellow";ctx.beginPath();ctx.arc(pacman.x,pacman.y,20,0,Math.PI*2);ctx.fill();ctx.fillStyle="white";dots.forEach(dot=>{ctx.beginPath();ctx.arc(dot.x,dot.y,5,0,Math.PI*2);ctx.fill();});}function update(){if(keys["ArrowRight"])pacman.x+=5;if(keys["ArrowLeft"])pacman.x-=5;if(keys["ArrowUp"])pacman.y-=5;if(keys["ArrowDown"])pacman.y+=5;dots=dots.filter(dot=>Math.sqrt((pacman.x-dot.x)**2+(pacman.y-dot.y)**2)>25);}const keys={};document.addEventListener("keydown",e=>keys[e.key]=true);document.addEventListener("keyup",e=>keys[e.key]=false);function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}gameLoop();</script></body></html>
