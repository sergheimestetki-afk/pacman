<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pac‑Man (Web)</title>
  <link rel="stylesheet" href="/workspace/styles.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <div class="hud-item"><span class="label">Score</span><span id="score">0</span></div>
      <div class="hud-item"><span class="label">Lives</span><span id="lives">3</span></div>
      <div class="hud-item"><span class="label">Level</span><span id="level">1</span></div>
    </header>

    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="hidden"></div>
    </div>

    <footer class="help">
      <div>Arrows / WASD to move. Press N to start next level. Press R to restart.</div>
    </footer>
  </div>

  <script defer src="/workspace/js/game.js"></script>
</body>
</html>
